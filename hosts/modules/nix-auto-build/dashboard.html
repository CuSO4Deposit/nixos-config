<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>nix-auto-build</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b26;color:#a9b1d6;font-family:monospace;padding:2rem}
h1{color:#7aa2f7;margin-bottom:1rem}
.meta{color:#565f89;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
.card{background:#24283b;border-radius:8px;padding:1rem;border-left:4px solid #565f89}
.card.success{border-left-color:#9ece6a}
.card.failed{border-left-color:#f7768e}
.card.building{border-left-color:#e0af68}
.card.pending{border-left-color:#565f89}
.host{font-size:1.1rem;font-weight:bold;color:#c0caf5}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.8rem;margin-left:.5rem}
.badge.success{background:#9ece6a;color:#1a1b26}
.badge.failed{background:#f7768e;color:#1a1b26}
.badge.building{background:#e0af68;color:#1a1b26}
.badge.pending{background:#565f89;color:#c0caf5}
.detail{color:#565f89;font-size:.85rem;margin-top:.5rem;word-break:break-all}
</style>
</head>
<body>
<h1>nix-auto-build</h1>
<div class="meta" id="meta">loading...</div>
<div class="grid" id="grid"></div>
<script>
async function load(){
  try{
    const r=await fetch('/status.json');
    const d=await r.json();
    document.getElementById('meta').textContent='Last run: '+(d.last_run||'never');
    const g=document.getElementById('grid');
    g.innerHTML='';
    for(const[h,v]of Object.entries(d.hosts||{})){
      const s=v.status||'pending';
      g.innerHTML+='<div class="card '+s+'"><span class="host">'+h+'</span><span class="badge '+s+'">'+s+'</span><div class="detail">'+(v.updated?'Updated: '+v.updated:'')+'</div>'+(v.store_path?'<div class="detail">'+v.store_path+'</div>':'')+(v.error?'<div class="detail" style="color:#f7768e">'+v.error+'</div>':'')+'</div>';
    }
  }catch(e){document.getElementById('meta').textContent='Failed to load status'}
}
load();setInterval(load,30000);
</script>
</body>
</html>
